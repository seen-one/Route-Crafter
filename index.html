<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GPX Route Generator for Street Coverage">
    <meta name="keywords" content="GPX route, street mapping, OpenStreetMap, route planning, Mapillary, street view collection">
    <meta name="author" content="Route Crafter">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#007bff">
    
    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="Route Crafter">
    <meta property="og:description" content="GPX Route Generator for Street Coverage">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://route.crafter.seen.one">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Route Crafter">
    <meta name="twitter:description" content="Generate efficient GPX routes covering every street">
    
    <title>Route Crafter</title>
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 64 64'><rect width='100%25' height='100%25' fill='transparent'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='64'>🛣️</text></svg>">
    
    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Route Crafter",
      "description": "GPX Route Generator for Street Coverage",
      "url": "https://route.crafter.seen.one",
      "applicationCategory": "MapsApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Route Crafter"
      }
    }
    </script>
    
    <link rel="stylesheet" href="vendor/leaflet/1.9.4/leaflet.css">
    <script src="vendor/leaflet/1.9.4/leaflet.js"></script>
    <script src="vendor/osmtogeojson/3.0.0-beta.5/osmtogeojson.js"></script>
    <script src="vendor/turf/6.5.0/turf.min.js"></script>
    <script src="vendor/leaflet-gpx/2.2.0/gpx.min.js"></script>
    <script src="vendor/leaflet.vectorgrid/1.3.0/Leaflet.VectorGrid.js"></script>
    <script src="vendor/pbf/3.2.1/pbf.js"></script>
    <link rel="stylesheet" href="vendor/leaflet.draw/1.0.4/leaflet.draw.css">
    <script src="vendor/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="appLayout">
        <aside id="controlsSidebar" class="controls-sidebar" aria-label="Route controls"></aside>
        <main id="mapShell" class="map-shell">
            <div id="map"></div>
        </main>
    </div>
    
    <!-- File Upload Input (hidden) -->
    <input type="file" id="overpassUploadInput" accept=".json" style="display: none;">
    
    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu">
        <div class="context-menu-item" data-action="set-depot">Set Starting Location</div>
        <div class="context-menu-item" data-service="openstreetmap">OpenStreetMap</div>
        <div class="context-menu-item" data-service="openstreetmap-query">Query Features</div>
        <div class="context-menu-item" data-service="nominatim">Nominatim</div>
        <div class="context-menu-item" data-service="mapillary">Mapillary</div>
        <div class="context-menu-item" data-service="panoramax">Panoramax</div>
        <div class="context-menu-item" data-service="kartaview">KartaView</div>
        <div class="context-menu-item" data-service="mapilio">Mapilio</div>
    </div>

    <!-- Media Player Controls -->
    <div id="mediaControls" class="media-controls">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0.0 km / 0.0 km</div>
        </div>
        <div class="media-controls-row">
            <button class="media-btn" id="playFromBeginningBtn">⏮️</button>
            <button class="media-btn" id="playPauseBtn">▶️</button>
            <button class="media-btn" id="closeBtn">✕</button>
        </div>
        <div class="media-controls-row">
            <div class="speed-control">
                <span style="font-size: 12px; color: #666;">Speed:</span>
                <button class="speed-btn" data-speed="0.1">0.1x</button>
                <button class="speed-btn active" data-speed="0.25">0.25x</button>
                <button class="speed-btn" data-speed="0.5">0.5x</button>
                <button class="speed-btn" data-speed="1">1x</button>
            </div>
        </div>
    </div>
    
    <script src="js/teavm.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
